<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="bitbug_favicon.ico" type="image/x-icon">
    <title>Agent 101 智能体指北</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#9333ea',
                        'dark-bg': '#000000',
                        'dark-card': '#1d1d1f',
                        'dark-secondary': '#2d2d2f',
                        'dark-border': '#3d3d3d',
                        'light-text': '#f5f5f7',
                        'muted-text': '#a1a1a6',
                    },
                    fontFamily: {
                        sans: ['SF Pro Display', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .transition-smooth {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-dark-bg font-sans text-light-text">
    <!-- 导航栏 -->
    <nav class="fixed top-0 left-0 right-0 bg-dark-card/80 backdrop-blur-md z-50 border-b border-dark-border">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-xl font-semibold text-primary hover:text-primary/80 transition-smooth">
                <i class="fa fa-arrow-left mr-2"></i>返回首页
            </a>
            <div class="text-xl font-semibold text-primary">XXX</div>
        </div>
    </nav>

    <!-- 内容区域 -->
    <main class="min-h-screen flex items-center justify-center pt-20">
        <div class="container mx-auto px-4">
            <div class="max-w-lg mx-auto text-center">
                <!-- 空状态图标 -->
                <div class="w-32 h-32 mx-auto mb-8 rounded-full bg-dark-secondary flex items-center justify-center">
                    <i class="fa fa-pencil-square-o text-5xl text-muted-text"></i>
                </div>
                
                <h1 class="text-3xl font-bold mb-4">Agent 101 智能体指北</h1>
                
                <div class="bg-dark-card rounded-2xl p-8 border border-dark-border">
                    <div class="flex items-center justify-center mb-4">
                        <i class="fa fa-cog fa-spin text-2xl text-primary mr-3"></i>
                        <span class="text-2xl font-semibold text-light-text">内容创作中</span>
                    </div>
                    <p class="text-muted-text">精彩内容即将呈现，敬请期待...</p>
                </div>
                
                <a href="index.html" class="inline-block mt-8 bg-primary text-white px-6 py-3 rounded-full hover:bg-primary/90 transition-smooth">
                    <i class="fa fa-home mr-2"></i>返回首页
                </a>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="py-8 bg-black text-white border-t border-dark-border">
        <div class="container mx-auto px-4 text-center">
            <p class="text-muted-text text-sm">© 2026 个人社交主页. 保留所有权利.</p>
        </div>
    </footer>
</body>
</html>
